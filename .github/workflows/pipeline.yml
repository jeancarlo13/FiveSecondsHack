name: CI/CD
# Single workflow that covers both CI (validate job) and CD (release job).
# Triggered on all PR lifecycle events so both phases share one pipeline file.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

# Cancel any in-progress run for the same PR when a new one is triggered.
# Keeps runners free on force-pushes; release runs are unaffected (merged once).
concurrency:
  group: pipeline-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── CI ──────────────────────────────────────────────────────────────────────
  # Runs on every PR update (skipped when the PR is closed).
  validate:
    name: Validate PR
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements*.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate project version
        # Skip Dependabot PRs: they never bump pyproject.toml and always use a
        # 'dependabot/' branch prefix — this is more reliable than actor/sender checks.
        if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          git show "${BASE_SHA}:pyproject.toml" > /tmp/pyproject.base.toml
          python .github/scripts/validate_version.py /tmp/pyproject.base.toml

      - name: Compile check
        run: python -m compileall -q src

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Tests and coverage
        run: pytest

  # ── CD ──────────────────────────────────────────────────────────────────────
  # Runs only when a PR is merged into the default branch.
  # Creates a GitHub release and publishes the Docker image to GHCR.
  release:
    name: Release on merge
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: read

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Read project version
        id: version
        run: python .github/scripts/write_version_output.py

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: container/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:latest

      - name: Build release notes
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE: ${{ steps.image.outputs.name }}
          OUTPUT_FILE: /tmp/release_body.md
        run: python .github/scripts/build_release_notes.py

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "#${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
          body_path: /tmp/release_body.md
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
