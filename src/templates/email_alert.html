<style>${styles}</style>
<div class="fsh-card">
  <div class="fsh-header">
    <span class="fsh-header-badge">Five Seconds Hack</span>
    <h2 class="fsh-header-title">${title}</h2>
  </div>
  <div class="fsh-body">
    <div class="fsh-meta">
      <span class="fsh-file-badge">📂 ${component_path} (Line ${line_number})</span>
      <div class="fsh-timestamp">🕐 Reported on ${issue_created_at}</div>
    </div>
    <p class="fsh-explanation">${explanation}</p>
    <div class="fsh-blocks">
      <div class="fsh-block-smell">
        <div class="fsh-label-smell">❌ Real Code Smell (${rule_id})</div>
        ${code_smell_block}
        <div class="fsh-sonar-hint">Sugerencia de Sonar: ${sonar_message_es}</div>
      </div>
      <div>
        <div class="fsh-label-fix">✅ 5-Second Refactor</div>
        ${suggested_block}
      </div>
    </div>
  </div>
</div>
