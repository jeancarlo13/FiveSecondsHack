version: '3.8'

services:
  five_seconds_hack:
    build: .
    container_name: five_seconds_hack
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${STATUS_PORT:-8080}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "${STATUS_PORT:-8080}:${STATUS_PORT:-8080}"
    volumes:
      - ./sonar_state.json:/app/sonar_state.json
      - ./error.log:/app/error.log
      - ./tmp:/app/tmp
    env_file:
      - .env